name: Feature request
description: Suggest a new option or behavior change
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe what you want and why. Config toggles and per-ally behavior are common requests—be specific. The mod can be configured in-game (**Fated Encounters** settings) or in r2modman.

        Current mod page: [Thunderstore](https://thunderstore.io/c/hades-ii/p/MarcoAntolini/FatedEncounters/)

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What limitation are you hitting with the mod or vanilla game?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should the mod behave? Include setting ideas if relevant (ally toggles, region shuffle, Chaos Trials, Dream Dives, etc.)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve it, or workarounds you tried
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Which part of the mod?
      options:
        - Ally encounters (Nemesis, Artemis, Heracles, Icarus, Athena)
        - Zagreus / Infernal Contract
        - Chronos (Erebus–Oceanus hub)
        - Chaos Trials or Dream Dives
        - In-game settings / r2modman config
        - Documentation
        - Other
    validations:
      required: false
